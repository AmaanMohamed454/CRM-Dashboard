<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WooCRM Access Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { dark: '#0B0F19', darker: '#05070A' }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass-auth { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .auth-input { transition: all 0.3s ease; }
        .auth-input:focus { transform: translateY(-1px); box-shadow: 0 4px 20px -2px rgba(79, 70, 229, 0.2); }
    </style>
</head>
<body class="bg-darker text-gray-200 min-h-screen flex items-center justify-center p-4" style="background-image: radial-gradient(circle at 50% 0%, rgba(79, 70, 229, 0.1), transparent 50%);">

    <div class="glass-auth border border-slate-700/50 rounded-3xl p-8 max-w-md w-full shadow-2xl relative overflow-hidden">
        <!-- Glow effect -->
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-indigo-500/20 rounded-full blur-[50px] pointer-events-none"></div>
        
        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-indigo-500/20 mb-4">
                <i class="fas fa-layer-group text-2xl text-white"></i>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">Access Portal</h2>
            <p class="text-slate-400 text-sm mt-1">Supabase Client Auth Ready</p>
        </div>

        <div id="messageBox" class="hidden mb-6 text-sm font-medium p-4 rounded-xl border"></div>

        <!-- Tabs -->
        <div class="flex p-1 bg-slate-800/50 rounded-xl mb-6 relative z-10" id="tabs-container">
            <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-2 text-sm font-semibold rounded-lg bg-slate-700 text-white shadow transition-all">Log In</button>
            <button onclick="switchTab('register')" id="tab-register" class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition-all">Create Account</button>
        </div>

        <!-- Login Form -->
        <form id="form-login" onsubmit="handleAuth(event, 'login')" class="space-y-4 relative z-10">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Email Address</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                    <input type="email" id="login-email" required class="auth-input w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                    <input type="password" id="login-password" required class="auth-input w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-indigo-500/25 mt-2 hover:-translate-y-0.5">
                Secure Login <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>

        <!-- Register Form (Hidden by default) -->
        <form id="form-register" onsubmit="handleAuth(event, 'register')" class="space-y-4 relative z-10 hidden">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Full Name</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="reg-name" required class="auth-input w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="John Doe">
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Email Address</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                    <input type="email" id="reg-email" required class="auth-input w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="john@example.com">
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Create Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                    <input type="password" id="reg-password" required minlength="6" class="auth-input w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-semibold py-3 rounded-xl transition-all border border-slate-600 mt-2 hover:bg-emerald-600 hover:border-emerald-500">
                Create & Save to DB
            </button>
        </form>
    </div>

    <!-- Logic for the Finished Local Application -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Setup demo admin if no DB exists
            if (!localStorage.getItem('woocrm_db')) {
                const initialDB = { "admin@store.com": { name: "Admin Setup", pass: "password123" } };
                localStorage.setItem('woocrm_db', JSON.stringify(initialDB));
            }
            
            // Auto fill based on first registered user just for preview speed
            const db = JSON.parse(localStorage.getItem('woocrm_db'));
            const firstEmail = Object.keys(db)[0];
            if (firstEmail) {
                document.getElementById('login-email').value = firstEmail;
                document.getElementById('login-password').value = db[firstEmail].pass;
            }
        });

        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const msgBox = document.getElementById('messageBox');
            
            msgBox.classList.add('hidden'); // Clear messages on tab switch

            if (tab === 'login') {
                loginForm.classList.remove('hidden'); registerForm.classList.add('hidden');
                tabLogin.className = 'flex-1 py-2 text-sm font-semibold rounded-lg bg-slate-700 text-white shadow transition-all';
                tabRegister.className = 'flex-1 py-2 text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition-all';
            } else {
                loginForm.classList.add('hidden'); registerForm.classList.remove('hidden');
                tabRegister.className = 'flex-1 py-2 text-sm font-semibold rounded-lg bg-slate-700 text-white shadow transition-all';
                tabLogin.className = 'flex-1 py-2 text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition-all';
            }
        }

        function handleAuth(e, type) {
            e.preventDefault();
            const msgBox = document.getElementById('messageBox');
            msgBox.classList.remove('hidden');
            
            // "Database"
            let db = JSON.parse(localStorage.getItem('woocrm_db')) || {};

            if (type === 'register') {
                const name = document.getElementById('reg-name').value;
                const email = document.getElementById('reg-email').value;
                const pass = document.getElementById('reg-password').value;

                if (db[email]) {
                    msgBox.className = 'mb-6 text-sm font-medium p-4 rounded-xl border text-red-400 bg-red-500/10 border-red-500/30';
                    msgBox.innerHTML = '<i class="fas fa-exclamation-circle mr-2"></i>User exists in Database!';
                    return;
                }

                // Insert into Database
                db[email] = { name, pass };
                localStorage.setItem('woocrm_db', JSON.stringify(db));

                msgBox.className = 'mb-6 text-sm font-medium p-4 rounded-xl border text-emerald-400 bg-emerald-500/10 border-emerald-500/30';
                msgBox.innerHTML = '<i class="fas fa-check-circle mr-2"></i>Account saved to Database! You can log in.';
                e.target.reset();
                
                // Auto fill login
                document.getElementById('login-email').value = email;
                document.getElementById('login-password').value = pass;

                setTimeout(() => switchTab('login'), 1500);
                
            } else {
                // Login
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-password').value;

                if (db[email] && db[email].pass === pass) {
                    msgBox.className = 'mb-6 text-sm font-medium p-4 rounded-xl border text-indigo-400 bg-indigo-500/10 border-indigo-500/30';
                    msgBox.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Authenticated against Database... redirecting...';
                    
                    // Save active session
                    localStorage.setItem('woocrm_session', JSON.stringify({ email, name: db[email].name }));

                    setTimeout(() => {
                        window.location.href = window.location.href.replace('login.html', 'dashboard.html');
                    }, 1000);
                } else {
                    msgBox.className = 'mb-6 text-sm font-medium p-4 rounded-xl border text-red-400 bg-red-500/10 border-red-500/30';
                    msgBox.innerHTML = '<i class="fas fa-times-circle mr-2"></i>Invalid Credentials';
                }
            }
        }
    </script>
</body>
</html>
